permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    paths:
      - .github/workflows/mihomo-rules.yml
      - mihomo/rules/manifest.yaml

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: install_deps
        run: |
          set -euxo pipefail
          source .github/scripts/build.sh

          client="mihomo"
          install_deps "$client"

      - name: init_rule_dirs
        run: |
          set -euxo pipefail
          source .github/scripts/build.sh

          client="mihomo"
          init_rule_dirs "$client"

      - name: download_rules
        run: |
          set -euxo pipefail
          source .github/scripts/build.sh

          client="mihomo"
          manifest="$client/rules/manifest.yaml"
          source_dir="$client/rules/source"

          download_rules "$manifest" "$source_dir"

      - name: show_manifest
        run: |
          set -euxo pipefail

          client="mihomo"
          manifest="$client/rules/manifest.yaml"

          echo "=== manifest ==="
          yq -r '.rules[] | [.name, .type] | @tsv' "$manifest"

      - name: build_rules
        run: |
          set -euxo pipefail
          source .github/scripts/build.sh

          client="mihomo"

          manifest="$client/rules/manifest.yaml"
          source_dir="$client/rules/source"
          merged_dir="$client/rules/merged"
          compiled_dir="$client/rules/compiled"

          while IFS=$'\t' read -r name type; do
            echo ">>> START: $name ($type)"

            merged_temp=$(mktemp)
            merged_file="$merged_dir/$name.yaml"

            extract_rules "$source_dir/$name" "$merged_temp"

            if [ ! -s "$merged_temp" ]; then
              echo "⚠️ empty after extract: $name"
              rm -f "$merged_temp"
              continue
            fi

            exclude_rules "$manifest" "$name" "$merged_temp"
            include_rules "$manifest" "$name" "$merged_temp"

            sort_rules "$merged_temp"

            if [ ! -s "$merged_temp" ]; then
              echo "⚠️ empty after process: $name"
              rm -f "$merged_temp"
              continue
            fi

            echo "payload:" > "$merged_file"

            case $type in
              domain)
                sed 's/^/  - "/; s/$/"/' "$merged_temp" >> "$merged_file"
                mihomo convert-ruleset domain yaml "$merged_file" "$compiled_dir/$name.mrs" \
                  || { echo "❌ convert failed: $name"; cat "$merged_file"; exit 1; }
                ;;
              ipcidr)
                sed 's/^/  - /' "$merged_temp" >> "$merged_file"
                mihomo convert-ruleset ipcidr yaml "$merged_file" "$compiled_dir/$name.mrs" \
                  || { echo "❌ convert failed: $name"; cat "$merged_file"; exit 1; }
                ;;
              classical)
                sed 's/^/  - /' "$merged_temp" >> "$merged_file"
                ;;
              *)
                echo "❌ unknown type: $type"
                exit 1
                ;;
            esac

            rm -f "$merged_temp"

            echo ">>> DONE: $name"

          done < <(yq -r '.rules[] | [.name, .type] | @tsv' "$manifest")

      - name: sync_rules
        run: |
          set -euxo pipefail
          source .github/scripts/build.sh

          client="mihomo"
          sync_rules "$client/rules"