permissions:
  contents: write

on:
  workflow_dispatch:

  push:
    paths:
      - common/icons/manifest.yaml
      - .github/workflows/common-icons.yml

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - run: |
          sudo curl -fsSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - run: |
          sudo apt-get update -y
          sudo apt-get install -y librsvg2-bin

      - run: |
          rm -rf common/icons/{services,policies,flags}
          mkdir -p common/icons/{services,policies,flags}/{svg,png}

      - run: |
          yq -r '.icons[] | select(.source) | (.category + "/" + .name) + " " + .source' common/icons/manifest.yaml \
            | xargs -n2 -P10 sh -c 'curl -fsSL "$2" -o "common/icons/$1/svg/${1##*/}.svg"' sh

      - run: |
          yq -r '.icons[] | select(.source) | [.category, .name] | @tsv' common/icons/manifest.yaml \
            | xargs -n2 -P10 sh -c 'rsvg-convert -w 64 "common/icons/$1/svg/$2.svg" -o "common/icons/$1/png/$2.png"' sh

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add common/icons
          git diff --cached --quiet || git commit -m "Updated on $(TZ=Asia/Shanghai date '+%F at %T')"
          git push
