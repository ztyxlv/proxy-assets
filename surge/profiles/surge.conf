[General]
all-hybrid = false
allow-dns-svcb = false
allow-hotspot-access = false
allow-wifi-access = false
# always-raw-tcp-hosts = 
# always-raw-tcp-keywords = 
# always-real-ip = 
auto-suspend = true
block-quic = per-policy
compatibility-mode = 3
debug-cpu-usage = false
debug-memory-usage = false
disable-geoip-db-auto-update = false
dns-server = 223.5.5.5
encrypted-dns-follow-outbound-mode = false
# encrypted-dns-server = 
encrypted-dns-skip-cert-verification = false
exclude-simple-hostnames = false
# external-controller-access = @127.0.0.1:6170
# force-http-engine-hosts = 
gateway-restricted-to-lan = true
# geoip-maxmind-url = 
hide-vpn-icon = false
hijack-dns = *:53
# http-api = @127.0.0.1:6171
http-api-tls = false
http-api-web-dashboard = false
icmp-forwarding = true
include-all-networks = false
include-apns = false
include-cellular-services = false
include-local-networks = false
internet-test-url = http://connectivitycheck.gstatic.com/generate_204
ipv6 = false
ipv6-vif = off
loglevel = notify
proxy-restricted-to-lan = true
# proxy-test-udp = 
proxy-test-url = http://cp.cloudflare.com/generate_204
show-error-page = true
show-error-page-for-reject = true
# skip-proxy = 
test-timeout = 3
# tun-excluded-routes = 
# tun-included-routes = 
udp-policy-not-supported-behaviour = REJECT
udp-priority = false
use-local-host-item-for-proxy = false
# wifi-access-http-auth = 
# wifi-access-http-port = 6152
# wifi-access-socks5-port = 6153
wifi-assist = false
full-header-mode = false
use-default-policy-if-wifi-not-primary = false
read-etc-hosts = false
# http-listen = 0.0.0.0:6152
# socks5-listen = 0.0.0.0:6153

[Proxy]

[Proxy Group]
Gaming = select, DIRECT, REJECT
Streaming = select, DIRECT, REJECT
Messaging = select, DIRECT, REJECT
Finance = select, DIRECT, REJECT
Commerce = select, DIRECT, REJECT
Intelligence = select, DIRECT, REJECT
GlobalMedia = select, DIRECT, REJECT
ChinaMedia = select, DIRECT, REJECT
Microsoft = select, DIRECT, REJECT
Google = select, DIRECT, REJECT
Apple = select, DIRECT, REJECT
ProxyX = select, DIRECT, REJECT
DirectX = select, DIRECT, REJECT
RejectX = select, REJECT, DIRECT
HK Nodes = smart, include-all-proxies = true, policy-regex-filter = HK
TW Nodes = smart, include-all-proxies = true, policy-regex-filter = TW
JP Nodes = smart, include-all-proxies = true, policy-regex-filter = JP
SG Nodes = smart, include-all-proxies = true, policy-regex-filter = SG
US Nodes = smart, include-all-proxies = true, policy-regex-filter = US

