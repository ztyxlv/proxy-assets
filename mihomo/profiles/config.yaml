    filter: HK
    icon: https://raw.githubusercontent.com/ztyxlv/profiles-proxy/main/common/icons/flags/svg/hk.svg

  - name: TW
    <<: *proxy-group-region
    filter: TW
    icon: https://raw.githubusercontent.com/ztyxlv/profiles-proxy/main/common/icons/flags/svg/tw.svg

  - name: JP
