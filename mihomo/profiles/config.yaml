allow-lan: false

mode: rule

log-level: info

ipv6: true

external-controller: 127.0.0.1:9090

external-ui: dashboard

external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

profile:
  store-selected: true
  store-fake-ip: true

unified-delay: true

tcp-concurrent: true

dns:
  enable: true
  cache-algorithm: arc
  prefer-h3: false
  listen: 127.0.0.1:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter:
    - RULE-SET,real-ip,real-ip
    - MATCH,fake-ip
  fake-ip-filter-mode: rule
  respect-rules: false
  default-nameserver: [system]
  nameserver-policy:
    "rule-set:direct-domain": [system]
  proxy-server-nameserver: [https://dns.alidns.com/dns-query]
  proxy-server-nameserver-policy: []
  nameserver: [https://dns.alidns.com/dns-query]

sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    QUIC:
      ports: [443, 8443]
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]

mixed-port: 7892

tun:
  enable: true
  stack: mixed
  device: mihomo
  auto-route: true
  auto-detect-interface: true
  dns-hijack: [any:53, tcp://any:53]
  strict-route: true
  mtu: 1440

proxies:

proxies-custom: &proxies-custom ["DIRECT"]

proxy-group-custom: &proxy-group-custom
  type: select

proxy-group-region: &proxy-group-region
  type: url-test
  url: https://cp.cloudflare.com/generate_204
  interval: 1800
  timeout: 3000
  max-failed-times: 3
  include-all-proxies: true
  tolerance: 30

proxy-groups:
  - name: GAM
    <<: *proxy-group-custom
    proxies: *proxies-custom
    icon: https://raw.githubusercontent.com/ztyxlv/profiles-proxy/main/common/icons/services/svg/gam.svg

  - name: VDO
    <<: *proxy-group-custom
    proxies: *proxies-custom
