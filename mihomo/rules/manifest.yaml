rules:
  - name: real-ip
    type: domain
    ruleset:
      - https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/fakeip-filter.list
    exclude:
      - "*"

  - name: direct-domain
    type: domain
    ruleset:
      - https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/private.list
    exclude:
      - "*"

  - name: direct-ipcidr
    type: ipcidr
    ruleset:
      - https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/privateip.list

  - name: direct-classical
    type: classical
    include:
      - PROCESS-NAME,qbittorrent.exe
      - PROCESS-NAME,localsend_app.exe

  - name: yt-domain
    type: domain
    ruleset:
      - https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/youtube.list

  - name: sp-domain
    type: domain
    ruleset:
      - https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/spotify.list

  - name: tg-domain
    type: domain
    include:
      - t.me
      - +.telegram.org
      - +.telegram.me
      - +.telegra.ph
      - +.graph.org
      - +.cdn-telegram.org
      - +.telegram-cdn.org
      - +.tdesktop.com
      - +.tg.dev

  - name: tg-ipcidr
