    ruleset:
      - https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/telegramip.list

  - name: gh-domain
    type: domain
    include:
      - +.github.com
      - +.github.io
      - +.githubusercontent.com
      - +.githubapp.com
      - +.githubassets.com
      - +.githubcopilot.com
      - +.githubstatus.com
      - +.ghcr.io
      - +.npmjs.com
      - +.npmjs.org

  - name: nk-domain
